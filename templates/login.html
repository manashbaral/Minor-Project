<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — AMRDS</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">

<div class="login-card">
    <div class="login-card-header">
        <div class="login-logo-icon">⚗</div>
        <div class="login-logo-title">Laboratory Instrument · Access Control</div>
        <div class="login-system-name">Automated Multi-Reagent<br>Dispensing System</div>
    </div>

    <div class="login-card-body">

        <!-- Role selector -->
        <div class="login-role-row">
            <label class="role-option selected-operator" id="roleOptOperator">
                <input type="radio" name="role" value="operator" checked onchange="selectRole('operator')">
                🔬 Operator
            </label>
            <label class="role-option" id="roleOptAdmin">
                <input type="radio" name="role" value="admin" onchange="selectRole('admin')">
                ⚙ Admin
            </label>
        </div>

        <!-- Username -->
        <div class="login-field">
            <label class="dash-label" for="username">Username</label>
            <input type="text" id="username" class="dash-input" placeholder="Enter username"
                   autocomplete="username" autofocus>
        </div>

        <!-- Password -->
        <div class="login-field">
            <label class="dash-label" for="password">Password</label>
            <input type="password" id="password" class="dash-input" placeholder="Enter password"
                   autocomplete="current-password">
        </div>

        <button class="login-submit" id="loginBtn" onclick="doLogin()">
            ▶ Sign In
        </button>

        <div class="login-error" id="loginError"></div>
    </div>

    <div class="login-footer">
        AMRDS &nbsp;|&nbsp; Laboratory Use Only &nbsp;|&nbsp; ESP32 + Flask
    </div>
</div>

<script>
    let selectedRole = 'operator';

    function selectRole(role) {
        selectedRole = role;
        document.getElementById('roleOptAdmin').className    = 'role-option' + (role === 'admin'    ? ' selected-admin'    : '');
        document.getElementById('roleOptOperator').className = 'role-option' + (role === 'operator' ? ' selected-operator' : '');
        document.getElementById('loginError').style.display = 'none';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function doLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('loginBtn');
        const errorBox = document.getElementById('loginError');

        if (!username || !password) {
            showError('Please enter both username and password.');
            return;
        }

        btn.disabled    = true;
        btn.textContent = '⏳ Signing in...';
        errorBox.style.display = 'none';

        fetch('/login', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ username, password, selected_role: selectedRole })
        })
        .then(async res => {
            const data = await res.json();
            if (res.ok && data.status === 'success') {
                // Role mismatch check — handled server-side but double-check here
                window.location.href = '/';
            } else {
                showError(data.message || 'Login failed.');
                btn.disabled    = false;
                btn.textContent = '▶ Sign In';
            }
        })
        .catch(() => {
            showError('Connection error. Please try again.');
            btn.disabled    = false;
            btn.textContent = '▶ Sign In';
        });
    }

    function showError(msg) {
        const errorBox = document.getElementById('loginError');
        errorBox.textContent   = msg;
        errorBox.style.display = 'block';
    }
</script>
</body>
</html>
