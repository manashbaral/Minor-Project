<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Automated Multi-Reagent Dispensing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--lab-bg);
        }

        .login-wrap {
            width: 100%;
            max-width: 400px;
            padding: 16px;
        }

        .login-card {
            background: var(--lab-surface);
            border: 1px solid var(--lab-border);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .login-header {
            background: var(--lab-dark);
            color: var(--lab-bg);
            padding: 24px 28px 20px;
            text-align: center;
        }

        [data-theme="dark"] .login-header { color: #0e1621; }

        .login-logo {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.18em;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .login-title {
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 1.1rem;
            line-height: 1.4;
            margin: 0;
        }

        .login-body {
            padding: 28px;
        }

        .login-label {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--lab-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        .login-input {
            font-family: var(--font-mono);
            font-size: 0.88rem;
            background: var(--lab-surface-2);
            border: 1px solid var(--lab-border);
            border-radius: 4px;
            color: var(--lab-text);
            padding: 9px 12px;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .login-input:focus {
            border-color: var(--lab-primary);
            box-shadow: 0 0 0 3px rgba(91,158,255,0.15);
            background: var(--lab-surface);
        }

        .login-btn {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            padding: 10px;
            width: 100%;
            border-radius: 4px;
            border: none;
            background: var(--lab-primary);
            color: white;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }

        .login-btn:hover   { opacity: 0.9; }
        .login-btn:active  { transform: scale(0.98); }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .login-error {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--lab-danger);
            background: var(--lab-danger-bg);
            border: 1px solid var(--lab-danger);
            border-radius: 4px;
            padding: 8px 12px;
            margin-top: 14px;
            display: none;
        }

        .login-footer-note {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--lab-muted);
            text-align: center;
            margin-top: 20px;
            letter-spacing: 0.04em;
        }

        .field-group { margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="login-wrap">

    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">LABORATORY INSTRUMENT · ACCESS CONTROL</div>
            <p class="login-title">Automated Multi-Reagent<br>Dispensing System</p>
        </div>

        <div class="login-body">
            <div class="field-group">
                <label class="login-label" for="username">Username</label>
                <input type="text" id="username" class="login-input" placeholder="Enter username"
                       autocomplete="username" autofocus>
            </div>

            <div class="field-group">
                <label class="login-label" for="password">Password</label>
                <input type="password" id="password" class="login-input" placeholder="Enter password"
                       autocomplete="current-password">
            </div>

            <button class="login-btn" id="loginBtn" onclick="doLogin()">▶ Sign In</button>

            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <div class="login-footer-note">
        Automated Multi-Reagent Dispensing System &nbsp;|&nbsp; Laboratory Use Only
    </div>
</div>

<script>
    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
    });

    function doLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('loginBtn');
        const errorBox = document.getElementById('loginError');

        if (!username || !password) {
            showError('Please enter both username and password.');
            return;
        }

        btn.disabled = true;
        btn.textContent = '⏳ Signing in...';
        errorBox.style.display = 'none';

        fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(async res => {
            const data = await res.json();
            if (res.ok && data.status === 'success') {
                window.location.href = '/';
            } else {
                showError(data.message || 'Login failed.');
                btn.disabled = false;
                btn.textContent = '▶ Sign In';
            }
        })
        .catch(() => {
            showError('Connection error. Please try again.');
            btn.disabled = false;
            btn.textContent = '▶ Sign In';
        });
    }

    function showError(msg) {
        const errorBox = document.getElementById('loginError');
        errorBox.textContent = '[ERROR] ' + msg;
        errorBox.style.display = 'block';
    }
</script>
</body>
</html>
