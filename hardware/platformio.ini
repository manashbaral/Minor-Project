[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0

monitor_speed = 115200

lib_deps =
    esp32async/ESPAsyncWebServer @ ^3.9.6
    esp32async/AsyncTCP @ ^3.4.10
    bblanchon/ArduinoJson @ ^7.0.0